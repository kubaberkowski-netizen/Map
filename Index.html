embrandt, Rubens, Poussin and Canaletto in top-lit rooms, with the founders entombed in a strange amber-lit mausoleum at the building's heart. A serene south-London pilgrimage for anyone who loved the Soane Museum."},{id:"kenwood",n:"Kenwood House",a:"Hampstead",pc:"NW3",lat:51.5715,lng:-.168,c:"history",s:"free \xB7 Rembrandt & Vermeer",q:"Kenwood House Hampstead Heath",w:"A free neoclassical villa on the edge of Hampstead Heath with Robert Adam interiors and a staggering art collection \u2014 Rembrandt's late self-portrait, Vermeer's 'Guitar Player', Gainsborough and Turner, all left to the nation. The terrace view across the Heath to the City skyline is one of London's finest."},{id:"spaniards",n:"The Spaniards Inn",a:"Hampstead",pc:"NW3",lat:51.5718,lng:-.1782,c:"food",s:"1585 \xB7 Turpin & Dickens",q:"The Spaniards Inn Hampstead",w:"A 1585 coaching inn on the edge of the Heath, dark and creaking and thick with legend \u2014 the highwayman Dick Turpin is said to have been born here, Dickens put it in 'Pickwick', Keats wrote nearby, and Bram Stoker has Dracula's pursuers stop in. The walled garden is the summer prize."},{id:"freud",n:"Freud Museum",a:"Hampstead",pc:"NW3",lat:51.5497,lng:-.1772,c:"history",s:"the couch is here",q:"Freud Museum Maresfield Gardens London",w:"Sigmund Freud's last home, where he fled in 1938 after the Nazis took Vienna \u2014 and where the actual psychoanalytic couch, draped in its Persian rug, still sits in his study among his antiquities. His daughter Anna, a pioneer in her own right, lived on here for decades. Quietly extraordinary."},{id:"willowroad",n:"2 Willow Road",a:"Hampstead",pc:"NW3",lat:51.556,lng:-.1722,c:"oddity",s:"the Bond-villain house",q:"2 Willow Road National Trust Hampstead",w:"Ern\u0151 Goldfinger's 1939 modernist home, preserved by the National Trust with its ingenious folding rooms and a wall of modern art (Henry Moore, Max Ernst). Its odd claim to fame: neighbour Ian Fleming so loathed the architect that he named a Bond villain Goldfinger out of spite."},{id:"keatshouse",n:"Keats House",a:"Hampstead",pc:"NW3",lat:51.5556,lng:-.1672,c:"history",s:"where Keats wrote",q:"Keats House Hampstead",w:"The modest white villa where John Keats lodged from 1818 \u2014 he wrote 'Ode to a Nightingale' under a plum tree in the garden, fell in love with the girl next door, Fanny Brawne, then left for Rome to die at twenty-five. Romantic poetry's most poignant address."},{id:"bunhill",n:"Bunhill Fields",a:"Finsbury",pc:"EC1",lat:51.5232,lng:-.0878,c:"green",s:"Blake, Defoe & Bunyan",q:"Bunhill Fields burial ground City Road",w:"A walled nonconformist burial ground just beyond the old City wall, its name a corruption of 'Bone Hill'. William Blake, Daniel Defoe and John Bunyan all lie here among the plane trees; Blake's stone still draws pilgrims and fresh flowers. A startlingly peaceful pause off the City Road."},{id:"barbicancons",n:"Barbican Conservatory",a:"Barbican",pc:"EC2",lat:51.52,lng:-.0938,c:"green",s:"jungle in the concrete",q:"Barbican Conservatory",w:"Hidden inside the brutalist Barbican is a steamy tropical jungle \u2014 more than 1,500 species of plants and trees spilling over the concrete around fish ponds, the second-largest conservatory in London. It opens only on select days, so check ahead; palms against raw concrete is the entire point."},{id:"chelseaphysic",n:"Chelsea Physic Garden",a:"Chelsea",pc:"SW3",lat:51.4842,lng:-.164,c:"green",s:"since 1673 \xB7 walled",q:"Chelsea Physic Garden",w:"London's oldest botanic garden, founded by the Society of Apothecaries in 1673 to grow medicinal plants by the Thames. A walled four acres of rare and poisonous specimens, the country's oldest rock garden, and a microclimate mild enough for grapefruit to ripen outdoors. Paid entry, and worth it."},{id:"abbeyroad",n:"Abbey Road Crossing",a:"St John's Wood",pc:"NW8",lat:51.532,lng:-.1775,c:"music",s:"the Beatles crossing",q:"Abbey Road Studios zebra crossing",w:"The most photographed zebra crossing on earth, outside the studios where the Beatles recorded almost everything and shot that 1969 cover. Tourists still hold up St John's Wood traffic to recreate the stride, and the studio wall is a rolling autograph book. Mind the cars \u2014 it's a live road."},{id:"allypally",n:"Alexandra Palace",a:"Muswell Hill",pc:"N22",lat:51.5945,lng:-.13,c:"pop",s:"birthplace of TV \xB7 big views",q:"Alexandra Palace",w:"The Victorian 'People's Palace' on a north-London hilltop \u2014 and the birthplace of television: the BBC made the world's first regular high-definition broadcasts from here in 1936. The transmitter mast still crowns the ridge, and the terrace view back over the whole city is enormous."},{id:"templechurch",n:"Temple Church",a:"Temple",pc:"EC4",lat:51.5135,lng:-.1105,c:"history",s:"the Templars' round church",q:"Temple Church London",w:"A round church built by the Knights Templar and consecrated in 1185, buried in the lawyers' warren of the Inns of Court \u2014 stone effigies of medieval knights lie across the floor of the nave. Made famous again by 'The Da Vinci Code', genuinely atmospheric, and very easy to walk past."},{id:"greatstbarts",n:"St Bartholomew the Great",a:"Smithfield",pc:"EC1",lat:51.519,lng:-.0998,c:"history",s:"Norman, since 1123",q:"St Bartholomew the Great Smithfield",w:"London's oldest surviving parish church, founded in 1123 beside Smithfield \u2014 a dim, massive Norman interior that feels centuries older than anything around it. You'll recognise it from 'Four Weddings', 'Shakespeare in Love' and a dozen films. Enter under the Tudor gatehouse off the old meat market."},{id:"yeoldemitre",n:"Ye Olde Mitre",a:"Holborn",pc:"EC1",lat:51.5187,lng:-.1075,c:"food",s:"1546 \xB7 hidden up an alley",q:"Ye Olde Mitre Ely Court London",w:"A tavern founded in 1546 and so well hidden up Ely Court that even cabbies miss it \u2014 once legally part of Cambridgeshire, so City constables couldn't make arrests inside. A preserved cherry tree marks where Elizabeth I is said to have danced; the snug back rooms are all dark oak. Closed weekends."},{id:"trinitybuoy",n:"Trinity Buoy Wharf",a:"Leamouth",pc:"E14",lat:51.5085,lng:.0085,c:"oddity",s:"lighthouse \xB7 1,000-year song",q:"Trinity Buoy Wharf lighthouse London",w:"London's only lighthouse stands where the Lea meets the Thames, on a spot where Michael Faraday once ran lighthouse experiments. Inside it plays 'Longplayer' \u2014 a piece of music composed to run a thousand years without repeating, begun on New Year's 2000. Around it sits a quirky village of stacked shipping containers and an American diner."},{id:"the100club",n:"The 100 Club",a:"Soho",pc:"W1",lat:51.5163,lng:-.134,c:"music",s:"jazz to punk, since 1942",q:"100 Club Oxford Street London",w:"A scruffy Oxford Street basement that's been a music room since 1942 \u2014 wartime jazz, the Rolling Stones, and the cradle of British punk: the legendary two-night Punk Special in 1976 with the Sex Pistols, the Clash and the Buzzcocks. Still putting bands on under your feet while the shoppers stream past above."},{id:"marxlibrary",n:"Marx Memorial Library",a:"Clerkenwell",pc:"EC1",lat:51.5225,lng:-.106,c:"finance",s:"where Lenin worked",q:"Marx Memorial Library Clerkenwell Green",w:"On Clerkenwell Green, in a 1738 former charity school, sits a library of radical and labour history \u2014 and the small back room where Lenin edited the revolutionary paper 'Iskra' in 1902\u201303 before smuggling it into Tsarist Russia. The Green has been London's protest pitch for centuries; visits are by tour."},{id:"woodygrill",n:"Woody Grill",a:"Shepherd's Bush",pc:"W12",lat:51.5046,lng:-.2224,c:"food",s:"charcoal grill, open late",q:"Woody Grill 1 Uxbridge Road Shepherd's Bush",w:"A Shepherd's Bush charcoal-grill stalwart right on Uxbridge Road \u2014 Turkish and wider Middle Eastern, everything cooked over fire in the open kitchen and portions built for two. Lamb shish, kofte and a pile of bread; cheap, generous, open late, two minutes off the Green."},{id:"truthcafe",n:"Truth Cafe",a:"Hammersmith",pc:"W6",lat:51.4925,lng:-.2235,c:"brunch",s:"global brunch, Hammersmith",q:"Truth Cafe Hammersmith London",w:"A bright, easygoing Hammersmith brunch room that globe-trots its breakfasts \u2014 Mexican chipotle eggs Benedict, sweet-potato waffles, towering American pancakes, with gluten-free and vegan well covered. Dog-friendly, a few tables outside, minutes from the Tube."},{id:"vintagecafe",n:"Vintage Caf\xE9 Shoreditch",a:"Shoreditch",pc:"E2",lat:51.5236,lng:-.0718,c:"brunch",s:"all-day breakfast, off Brick Lane",q:"Vintage Cafe Shoreditch Cheshire Street",w:"A cosy, nostalgically furnished caf\xE9 on Cheshire Street just off Brick Lane \u2014 all-day breakfasts, Eggs Royal, smashed avocado on sourdough and a properly good iced coffee, run warmly and independently. The kind of unhurried Sunday spot the East End does so well."},{id:"sundaybk",n:"Sunday in Brooklyn",a:"Notting Hill",pc:"W2",lat:51.5158,lng:-.1968,c:"brunch",s:"those praline pancakes",q:"Sunday in Brooklyn Westbourne Grove London",w:"The Williamsburg brunch favourite's first home outside New York, on a sunlit Westbourne Grove corner \u2014 the hazelnut maple praline pancakes are the headline, with a hot-honey fried-chicken sandwich and a cheddar scramble close behind. Walk-ins for weekend brunch; book otherwise."},{id:"burnt",n:"Burnt",a:"Shepherd's Bush",pc:"W12",lat:51.506,lng:-.239,c:"brunch",s:"brunch every day \xB7 Askew Rd",q:"Burnt 163 Askew Road London",w:"An Askew Road favourite that treats brunch as the main event, every day of the week \u2014 creative plates well beyond the avocado clich\xE9, a cult fried-chicken sandwich, Climpson & Sons coffee and Dusty Knuckle pastries given a house twist. Light, plant-filled, with a back garden for the sun."},{id:"orchardaskew",n:"Orchard",a:"Shepherd's Bush",pc:"W12",lat:51.5052,lng:-.2392,c:"food",s:"seasonal \xB7 Askew Rd",q:"Orchard 136 Askew Road London W12",w:"A quietly excellent neighbourhood caf\xE9-restaurant at the top of Askew Road, with a seasonal menu that shifts to whatever's actually good \u2014 relaxed weekend brunch, honest midweek dinners, the kind of place locals get territorial about. Book ahead on a sunny Saturday."},{id:"wildthyme",n:"Wild Thyme",a:"Shepherd's Bush",pc:"W12",lat:51.5042,lng:-.2268,c:"brunch",s:"local brunch favourite",q:"Wild Thyme cafe Shepherd's Bush London",w:"A long-running, much-recommended brunch spot tucked on a residential street off Uxbridge Road \u2014 French toast, the hearty Wild Thyme Breakfast and a roll-call of classics done properly. One of Shepherd's Bush's most reliable weekend tables."},{id:"climpsons",n:"Climpson & Sons",a:"Broadway Market",pc:"E8",lat:51.5378,lng:-.0608,c:"coffee",s:"the East London roaster",q:"Climpson and Sons Broadway Market",w:"A Broadway Market institution and one of London's defining roasters since 2005 \u2014 the espresso that fuels half of East London's caf\xE9s, poured at the source from a tiny, perpetually busy shopfront. Grab a cup and walk the market on a Saturday."},{id:"ozone",n:"Ozone Coffee Roasters",a:"Shoreditch",pc:"EC2A",lat:51.5258,lng:-.084,c:"coffee",s:"NZ roastery, Shoreditch",q:"Ozone Coffee Roasters Leonard Street London",w:"A New Zealand roastery-caf\xE9 on a Shoreditch corner \u2014 roasting downstairs, serving a big, buzzy all-day menu upstairs, and pouring some of the most consistent flat whites in the city. A cornerstone of London's antipodean coffee wave."},{id:"allpress",n:"Allpress Espresso",a:"Shoreditch",pc:"E2",lat:51.524,lng:-.0742,c:"coffee",s:"Redchurch St espresso",q:"Allpress Espresso Redchurch Street London",w:"The Kiwi roaster's Redchurch Street espresso bar \u2014 small, focused and excellent, the sort of place you queue at on the way to somewhere else. Beans roasted nearby; a flat white the obvious order."},{id:"origincoffee",n:"Origin Coffee",a:"Shoreditch",pc:"EC2A",lat:51.5258,lng:-.0795,c:"coffee",s:"Cor         *{box-sizing:border-box;}
        .root{min-height:100vh;background:#FFFFFF;color:#111;font-family:Arial,Helvetica,sans-serif;padding-bottom:56px;}
        .wrap{max-width:560px;margin:0 auto;padding:0 16px;}
        .mast{padding:18px 0 4px;display:flex;align-items:baseline;justify-content:space-between;}
        .mast h1{font-family:Georgia,'Iowan Old Style','Times New Roman',serif;font-size:23px;font-weight:600;font-style:italic;margin:0;letter-spacing:0;color:#161310;}
        .mast span{font-size:12px;color:#8A8A86;}
        .anchor{display:flex;align-items:center;gap:9px;border:1px solid #E9E9E6;border-radius:14px;padding:10px 12px;margin:12px 0 10px;}
        .anchor .t{flex:1;min-width:0;}
        .anchor .t b{display:block;font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
        .anchor .t i{font-style:normal;font-size:11px;color:#9A9A96;}
        .gps{display:flex;align-items:center;justify-content:center;width:38px;height:38px;border:1px solid #E9E9E6;border-radius:11px;background:#fff;cursor:pointer;color:#C8372D;flex:none;}
        .livepill{display:inline-flex;align-items:center;gap:5px;border:1px solid #E9E9E6;background:#fff;color:#9A9A96;border-radius:11px;padding:0 11px;height:38px;font-size:11px;font-weight:700;letter-spacing:.8px;cursor:pointer;font-family:inherit;flex:none;}
        .livepill .ldot{width:7px;height:7px;border-radius:50%;background:#C9C9C5;}
        .livepill.on{border-color:#C8372D;color:#C8372D;}
        .livepill.on .ldot{background:#C8372D;animation:pulse 1.2s ease infinite;}
        @keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(.75);}}
        .row{display:flex;gap:6px;overflow-x:auto;padding:2px 0 9px;scrollbar-width:none;}
        .row::-webkit-scrollbar{display:none;}
        .rowlbl{font-size:10px;font-weight:700;letter-spacing:1px;color:#B5B5B1;text-transform:uppercase;align-self:center;margin-right:2px;flex:none;}
        .chip{flex:none;border:1px solid #E9E9E6;background:#fff;color:#5A5A56;border-radius:99px;padding:7px 13px;font-size:12.5px;cursor:pointer;white-space:nowrap;font-family:inherit;}
        .chip.on{background:#111;border-color:#111;color:#fff;font-weight:700;}
        .chip.coll.on{background:#C8372D;border-color:#C8372D;}
        .seg{display:inline-flex;border:1px solid #E9E9E6;border-radius:99px;overflow:hidden;flex:none;}
        .seg button{border:none;background:#fff;color:#5A5A56;padding:7px 13px;font-size:12.5px;cursor:pointer;font-family:inherit;}
        .seg button.on{background:#111;color:#fff;font-weight:700;}
        .cust{display:flex;gap:6px;margin:0 0 10px;}
        .cust input{flex:1;border:1px solid #E9E9E6;border-radius:11px;padding:9px 12px;font-size:13px;font-family:inherit;color:#111;}
        .cust button{border:none;background:#111;color:#fff;border-radius:11px;padding:0 16px;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit;}
        .note{font-size:12px;color:#9A9A96;margin:6px 0 10px;}
        .note.warn{color:#C8372D;}
        .viewbar{display:flex;gap:6px;overflow-x:auto;padding:4px 0 10px;scrollbar-width:none;align-items:center;}
        .viewbar::-webkit-scrollbar{display:none;}
        .vb{flex:none;display:inline-flex;align-items:center;gap:6px;border:1px solid #E9E9E6;background:#fff;color:#5A5A56;border-radius:10px;padding:8px 11px;font-size:12.5px;cursor:pointer;font-family:inherit;}
        .vb.on{background:#111;border-color:#111;color:#fff;font-weight:700;}
        .vb.acc{border-color:#C8372D;color:#C8372D;font-weight:700;}
        .vb:disabled{opacity:.5;}
        .vbsep{width:1px;height:24px;background:#ECECE9;flex:none;margin:0 2px;}
        .tabs{display:flex;gap:18px;border-bottom:1px solid #EFEFEC;margin:2px 0 0;}
        .tabs .tb{border:none;background:none;font-family:inherit;font-size:13.5px;color:#9A9A96;padding:8px 2px 10px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;}
        .tabs .tb.on{color:#111;font-weight:700;border-bottom-color:#111;}
        .count{font-size:11.5px;color:#9A9A96;margin:12px 0 6px;}
        /* photo tiles */
        .tile{width:70px;height:70px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:27px;flex:none;overflow:hidden;}
        .tile .img,.img{width:100%;height:100%;object-fit:cover;}
        .tileBig{width:100%;height:200px;display:flex;align-items:center;justify-content:center;font-size:46px;overflow:hidden;}
        .imgBig{width:100%;height:100%;object-fit:cover;}
        /* map */
        .mapwrap{height:52vh;min-height:340px;border:1px solid #EFEFEC;border-radius:16px;overflow:hidden;margin-bottom:10px;}
        .leaflet-container{position:relative;overflow:hidden;background:#F6F6F3;font-family:inherit;height:100%;width:100%;}
        .leaflet-pane,.leaflet-tile,.leaflet-marker-icon,.leaflet-marker-shadow,.leaflet-tile-container,.leaflet-map-pane svg,.leaflet-map-pane canvas,.leaflet-zoom-box,.leaflet-image-layer,.leaflet-layer{position:absolute;left:0;top:0;}
        .leaflet-tile{width:256px;height:256px;}
        .leaflet-top,.leaflet-bottom{position:absolute;z-index:1000;pointer-events:none;}
        .leaflet-top{top:0}.leaflet-bottom{bottom:0}.leaflet-right{right:0}.leaflet-left{left:0}
        .leaflet-control{pointer-events:auto;}
        .mk{width:28px;height:28px;border-radius:50%;background:#fff;border:1.5px solid #C9C9C5;display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:0 1px 4px rgba(0,0,0,.18);cursor:pointer;}
        .mk.sv{border-color:#C8372D;} .mk.vf{border-color:#1F9E5A;border-width:2px;}
        .mk.is{transform:scale(1.3);border-color:#111;border-width:2px;}
        .org{width:16px;height:16px;border-radius:50%;background:#C8372D;border:3px solid #fff;box-shadow:0 0 0 3px rgba(200,55,45,.3),0 1px 4px rgba(0,0,0,.3);}
        .rdlbl{font-size:9px;font-weight:700;letter-spacing:.7px;color:#9C9C97;white-space:nowrap;transform:translate(-50%,-50%);pointer-events:none;}
        .arealbl{font-size:10px;font-weight:700;letter-spacing:.5px;color:#8FAE8C;white-space:nowrap;transform:translate(-50%,-50%);pointer-events:none;}
        .wlbl{font-size:10px;font-style:italic;color:#7FA6BF;white-space:nowrap;transform:translate(-50%,-50%);pointer-events:none;}
        /* cards */
        .card{border:1px solid #EFEFEC;border-radius:16px;margin-bottom:8px;overflow:hidden;background:#fff;}
        .card.dim{opacity:.5;}
        .card.feat{border-color:#C8372D;box-shadow:0 2px 14px rgba(200,55,45,.13);}
        .featTag{display:flex;align-items:center;gap:5px;background:#C8372D;color:#fff;font-size:11px;font-weight:700;letter-spacing:.5px;padding:6px 12px;}
        .head{display:flex;align-items:center;gap:11px;padding:10px 12px;cursor:pointer;width:100%;border:none;background:none;text-align:left;font-family:inherit;}
        .ttl{flex:1;min-width:0;}
        .ttl b{display:block;font-size:14.5px;font-weight:700;color:#111;line-height:1.25;}
        .plate{display:inline-flex;align-items:baseline;gap:5px;border:1px solid #DCDCD8;border-radius:4px;padding:1px 6px;font-size:9.5px;letter-spacing:1.1px;color:#444;margin-top:4px;}
        .plate em{font-style:normal;color:#C8372D;font-weight:700;}
        .right{flex:none;display:flex;flex-direction:column;align-items:flex-end;gap:3px;}
        .dist{font-size:13px;font-weight:700;color:#C8372D;}
        .dir{font-size:10px;color:#9A9A96;display:flex;align-items:center;gap:3px;}
        .arrow{display:inline-block;font-size:9px;color:#C8372D;}
        .chev{color:#C9C9C5;transition:transform .15s ease;}
        .chev.up{transform:rotate(180deg);}
        .body{padding:0 14px 12px;}
        .lore{font-size:13.5px;line-height:1.6;color:#3E3E3A;margin:2px 0 9px;}
        .src{font-size:11px;color:#9A9A96;margin-bottom:9px;}
        .comp{display:block;width:100%;text-align:left;background:#FAF7F2;border:1px solid #EFE7DD;border-radius:10px;padding:8px 11px;font-size:12px;color:#6A6A64;cursor:pointer;font-family:inherit;margin-bottom:10px;}
        .comp b{color:#111;}
        .acts{display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
        .walkb{display:inline-flex;align-items:center;gap:6px;background:#C8372D;color:#fff;border:none;border-radius:10px;padding:8px 13px;font-size:12.5px;font-weight:700;text-decoration:none;font-family:inherit;}
        .lite{display:inline-flex;align-items:center;gap:5px;border:1px solid #E9E9E6;color:#111;background:#fff;border-radius:10px;padding:8px 11px;font-size:12.5px;text-decoration:none;font-family:inherit;cursor:pointer;}
        .checkin{display:inline-flex;align-items:center;gap:5px;border:1px solid #1F9E5A;color:#1F9E5A;background:#fff;border-radius:10px;padding:8px 11px;font-size:12.5px;font-weight:700;cursor:pointer;font-family:inherit;}
        .ic{display:inline-flex;border:1px solid #E9E9E6;border-radius:10px;padding:8px;background:#fff;color:#9A9A96;cursor:pointer;}
        .ic.h.on{color:#C8372D;border-color:#C8372D;}
        .ic.v.on{color:#fff;background:#111;border-color:#111;}
        .spacer{flex:1;}
        .new{font-size:9px;font-weight:700;letter-spacing:1px;color:#C8372D;border:1px solid #C8372D;border-radius:4px;padding:1px 5px;margin-left:7px;vertical-align:2px;}
        .empty{text-align:center;color:#9A9A96;font-size:13.5px;padding:36px 14px;line-height:1.6;}
        .foot{font-size:11px;color:#B5B5B1;text-align:center;margin-top:18px;}
        .spin{animation:rot 1s linear infinite;}
        @keyframes rot{to{transform:rotate(360deg);}}
        /* radar */
        .radar{background:#16181B;border-radius:18px;padding:12px 12px 10px;margin-bottom:10px;}
        .rtop{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
        .seg.dark{border-color:#2A2E33;}
        .seg.dark button{background:#1F2226;color:#9AA0A6;}
        .seg.dark button.on{background:#E8584D;color:#fff;}
        .hbtn{display:inline-flex;align-items:center;gap:5px;border:1px solid #2A2E33;background:#1F2226;color:#9AA0A6;border-radius:99px;padding:7px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;margin-left:auto;}
        .hbtn.on{color:#fff;border-color:#E8584D;}
        .rsvg{width:100%;height:auto;display:block;}
        .ring{fill:none;stroke:#2C3036;stroke-width:1;stroke-dasharray:3 4;}
        .rlbl{fill:#5E646B;font-size:8.5px;font-family:Arial,Helvetica,sans-serif;}
        .rN{fill:#E8584D;font-size:12px;font-weight:700;font-family:Arial,Helvetica,sans-serif;}
        .tgt{display:flex;flex-direction:column;align-items:stretch;background:#1F2226;border:1px solid #2A2E33;border-radius:13px;padding:10px 12px;margin-top:8px;}
        .trow{display:flex;align-items:center;gap:10px;}
        .tdesc{font-size:11.5px;line-height:1.55;color:#AEB3B9;margin:9px 2px 0;}
        .tgt .tt{flex:1;min-width:0;}
        .tgt .tt i{display:block;font-style:normal;font-size:9px;letter-spacing:1.4px;color:#7E848B;font-weight:700;}
        .tgt .tt b{display:block;font-size:13.5px;color:#fff;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
        .tgt .tt span{font-size:11px;color:#9AA0A6;}
        .tgt .tm{font-size:19px;font-weight:700;color:#E8584D;flex:none;}
        .arrow.big{font-size:17px;color:#E8584D;flex:none;display:inline-block;}
        .ic.dark{border-color:#2A2E33;background:#1F2226;color:#9AA0A6;}
        .rnone{color:#9AA0A6;font-size:12.5px;text-align:center;padding:10px 6px 4px;}
        .rnote{font-size:10.5px;color:#6E747B;text-align:center;margin-top:7px;}
        .rnote.ok{color:#7FB58A;}
        /* walk */
        .walkhd{display:flex;align-items:center;gap:8px;margin:4px 0 10px;}
        .walkhd .seg{flex:none;}
        .routebox{border:1px solid #EFEFEC;border-radius:16px;overflow:hidden;margin-bottom:10px;}
        .routetop{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:13px 14px;background:#FAF7F2;border-bottom:1px solid #EFE7DD;}
        .routetop .big{font-size:20px;font-weight:700;color:#111;}
        .routetop .sub{font-size:11.5px;color:#8A8A86;}
        .gobtn{display:inline-flex;align-items:center;gap:6px;background:#C8372D;color:#fff;border:none;border-radius:11px;padding:10px 14px;font-size:13px;font-weight:700;text-decoration:none;font-family:inherit;}
        .stop{display:flex;align-items:center;gap:11px;padding:11px 14px;border-bottom:1px solid #F3F3F0;cursor:pointer;width:100%;background:none;border-left:none;border-right:none;border-top:none;text-align:left;font-family:inherit;}
        .stop:last-child{border-bottom:none;}
        .stopn{width:24px;height:24px;border-radius:50%;background:#111;color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex:none;}
        .stopt{flex:1;min-width:0;}
        .stopt b{display:block;font-size:13.5px;color:#111;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
        .stopt span{font-size:11px;color:#9A9A96;}
        .stopd{font-size:11.5px;color:#C8372D;font-weight:700;flex:none;}
        /* stats */
        .statgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:6px 0 12px;}
        .statcard{border:1px solid #EFEFEC;border-radius:14px;padding:13px 14px;}
        .statcard .n{font-size:24px;font-weight:700;color:#111;line-height:1;}
        .statcard .l{font-size:11.5px;color:#8A8A86;margin-top:5px;}
        .statcard .bar{height:6px;border-radius:99px;background:#F0F0EC;margin-top:9px;overflow:hidden;}
        .statcard .bar i{display:block;height:100%;background:#C8372D;}
        .catrow{display:flex;align-items:center;gap:9px;padding:8px 2px;}

        .catrow .cl{flex:1;font-size:12.5px;color:#3E3E3A;}

        .catrow .cb i{display:block;height:100%;background:#111;}
        .catrow .cn{font-size:11px;color:#9A9A96;width:34px;text-align:right;flex:none;}

        .gtop .gi{font-size:11px;letter-spacing:1.4px;color:#7E848B;font-weight:700;}
        .gdial{flex:1;display:flex;align-items:center;justify-content:center;padding:6px 0;}
        .gbig{font-size:64px;font-weight:800;line-height:.9;letter-spacing:-1px;text-align:center;}
        .gunit{font-size:18px;font-weight:700;color:#9AA0A6;margin-left:6px;}
        .gname{font-size:20px;font-weight:700;text-align:center;margin-top:8px;}
        .gmeta{font-size:12.5px;color:#9AA0A6;text-align:center;margin-top:4px;}
        .gdesc{font-size:12.5px;line-height:1.55;color:#AEB3B9;text-align:center;margin:10px 4px 0;}

        .ec-d{font-size:13px;font-weight:700;color:#C8372D;}

        .ec-near{font-size:11px;color:#A89E8E;}
        .ec-chev{color:#D2CBBE;flex:none;align-self:center;}

        .ec-feature{padding:15px 16px 14px;}

        .ec-h{font-family:Georgia,'Iowan Old Style','Times New Roman',serif;font-size:25px;font-weight:600;color:#161310;line-height:1.13;letter-spacing:-.3px;margin:0 0 7px;}
